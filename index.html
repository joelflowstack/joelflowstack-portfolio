<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Joel Flowstack — 3D Websites, AI Automations & Bots</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23080814'/%3E%3Ctext x='50' y='66' font-size='52' font-family='monospace' font-weight='700' text-anchor='middle' fill='%23A78BFA'%3EJF%3C/text%3E%3C/svg%3E"/>
<link rel="stylesheet" href="css/global.css"/>
<style>
html,body{height:100%;overflow:hidden;background:radial-gradient(ellipse 100% 80% at 50% 38%,#8f9599 0%,#6d7276 55%,#45484c 100%)}
#scroller{position:fixed;inset:0;overflow-y:scroll;z-index:0;scrollbar-width:none}
#scroller::-webkit-scrollbar{display:none}
#scroller-inner{height:500vh}
#c{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1}

#hl{position:fixed;left:clamp(1.5rem,4vw,4.5rem);bottom:clamp(2rem,6vh,4.5rem);z-index:10;pointer-events:none;transition:opacity .3s ease}
#hl h1{font-size:clamp(2rem,5vw,4.5rem);font-weight:700;letter-spacing:-.035em;line-height:.95;color:#1c2226;text-shadow:0 2px 20px rgba(255,255,255,.3)}
#hl h1 em{font-style:normal;background:linear-gradient(130deg,#1f7a8c,#2c3e46);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hl p{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(20,26,30,.5);margin-top:.65rem}

#si{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:.4rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(20,26,30,.55);pointer-events:none;opacity:0;animation:jfFade .8s 1.6s ease both;transition:opacity .4s}
#si .sil{width:1px;height:30px;background:linear-gradient(to bottom,rgba(31,122,140,.7),transparent);animation:jfLine 1.6s 1.8s ease infinite}
@keyframes jfLine{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
@keyframes jfFade{to{opacity:1}}

#ch{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:20;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:#122226;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);padding:.6rem 1.5rem;border-radius:50px;border:1px solid rgba(20,26,30,.15);display:none;align-items:center;gap:.55rem;pointer-events:none;white-space:nowrap;animation:jfBob 1.8s ease-in-out infinite;box-shadow:0 4px 24px rgba(0,0,0,.15)}
#ch.show{display:flex}
@keyframes jfBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

#jfEntering{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(69,72,76,0);pointer-events:none;transition:background .4s ease}
#jfEntering.go{background:rgba(40,44,48,.96)}
#jfEnteringText{font-family:'Space Mono',monospace;font-size:.9rem;letter-spacing:.25em;text-transform:uppercase;color:#8FF5FF;opacity:0;transition:opacity .3s .15s}
#jfEntering.go #jfEnteringText{opacity:1}

#jfLoader{position:fixed;inset:0;z-index:900;background:#6d7276;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s ease}
#jfLoader.done{opacity:0;pointer-events:none}
.jfRing{width:36px;height:36px;border:2px solid rgba(20,26,30,.2);border-top-color:#1f7a8c;border-radius:50%;animation:jfSpin .7s linear infinite}
@keyframes jfSpin{to{transform:rotate(360deg)}}
#jfLoader p{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(20,26,30,.5)}

#jfHelp{position:fixed;bottom:1.6rem;left:1.6rem;z-index:10;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(20,26,30,.35);display:none}
@media(min-width:700px){#jfHelp{display:block}}
</style>
</head>
<body>

<div id="jfLoader"><div class="jfRing"></div><p>Loading...</p></div>
<div id="scroller"><div id="scroller-inner"></div></div>
<canvas id="c"></canvas>

<div id="hl">
  <h1>Joel<br/><em>Flowstack</em></h1>
  <p>Scroll to enter</p>
</div>

<div id="si"><span>Scroll</span><div class="sil"></div></div>
<div id="ch">✦ <span>Click a square to enter</span> ✦</div>
<div id="jfEntering"><span id="jfEnteringText">Entering...</span></div>
<div id="jfHelp">Drag to rotate · Scroll to zoom</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"
  onerror="document.querySelector('#jfLoader p').textContent='Network error — refresh the page'"></script>
<script src="js/cube.js"></script>
<script>
if (typeof THREE === 'undefined') {
  document.querySelector('#jfLoader p').textContent = 'Could not load 3D engine — please refresh';
} else {
try {
(function () {
'use strict';

console.log('[JF Portal] Booting...');

/* ═══════════════════════════════════════
   RENDERER — opaque clear color, zero ambiguity
═══════════════════════════════════════ */
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight, false);
renderer.setClearColor(0x6d7276, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, .1, 100);
camera.position.set(0, .4, 12);
camera.lookAt(0, 0, 0);

var lights = JFCube.addLights(scene);
console.log('[JF Portal] Lights added.');

JFCube.addStudioBackdrop(scene);
console.log('[JF Portal] Studio backdrop added.');

/* ═══════════════════════════════════════
   STARS
═══════════════════════════════════════ */
var sN = 200, sP = new Float32Array(sN * 3);
for (var i = 0; i < sN * 3; i++) sP[i] = (Math.random() - .5) * 40;
var sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sP, 3));
var stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0x8866dd, size: .06, transparent: true, opacity: .4 }));
scene.add(stars);

/* ═══════════════════════════════════════
   THE CUBE — labels live directly on this one cube.
   No nested camera-flight, no secondary "inner" cube to
   position with matrix math. One cube, one set of pieces.
═══════════════════════════════════════ */
var NAV = [
  { gx:-1, gy: 1, label:'Home',      url:'pages/home.html' },
  { gx: 0, gy: 1, label:'About',     url:'pages/about.html' },
  { gx: 1, gy: 1, label:'Services',  url:'pages/services.html' },
  { gx:-1, gy: 0, label:'Portfolio', url:'pages/portfolio.html' },
  { gx: 1, gy: 0, label:'Blog',      url:'pages/blog.html' },
  { gx:-1, gy:-1, label:'Contact',   url:'pages/contact.html' },
  { gx: 0, gy:-1, label:'YouTube',   url:'https://www.youtube.com/channel/UCyB6tXCbdBczkZwD__VCdTA' },
  { gx: 1, gy:-1, label:'TikTok',    url:'https://www.tiktok.com/@joelflowstack' },
];

var cubeR = JFCube.build(scene, NAV, { plainCenter: true });
var cubeG = cubeR.group;
var cubeP = cubeR.pieces;
console.log('[JF Portal] Main cube built:', cubeP.length, 'pieces.');

/* Decorative nested mini cube on the center tile — purely cosmetic,
   spins independently, can never block navigation since it's not
   part of the raycast target list. */
var miniR = JFCube.build(scene, [], { parent: cubeG, plainCenter: true });
var miniG = miniR.group;
miniG.scale.setScalar(0.30);
miniG.position.set(0, 0, JFCube.GAP * 1.08 + 0.4);
console.log('[JF Portal] Mini decorative cube attached.');

/* ═══════════════════════════════════════
   SCROLL — single source of truth: P (0 → 1)
   Everything below is a pure, stateless function of P and t.
   No phase machine. No snapping. No accumulation bugs.
   Scrolling up always smoothly reverses everything.
═══════════════════════════════════════ */
var scroller = document.getElementById('scroller');
var P = 0;

scroller.addEventListener('scroll', function () {
  var max = Math.max(scroller.scrollHeight - scroller.clientHeight, 1);
  P = Math.min(Math.max(scroller.scrollTop / max, 0), 1);
}, { passive: true });

function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function smoothstep(a, b, x) { var t = clamp01((x - a) / (b - a)); return t * t * (3 - 2 * t); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

/* ── Drag-to-rotate (always available, adds on top of auto motion) ── */
var dragRotX = 0, dragRotY = 0;
var drag = false, pMX = 0, pMY = 0;

canvas.addEventListener('mousedown', function (e) { drag = true; pMX = e.clientX; pMY = e.clientY; });
window.addEventListener('mousemove', function (e) {
  if (!drag) return;
  dragRotY += (e.clientX - pMX) * .006;
  dragRotX += (e.clientY - pMY) * .006;
  dragRotX = Math.max(-.9, Math.min(.9, dragRotX));
  pMX = e.clientX; pMY = e.clientY;
});
window.addEventListener('mouseup', function () { drag = false; });

var tDrag = false, tPX = 0, tPY = 0;
canvas.addEventListener('touchstart', function (e) {
  tDrag = true; tPX = e.touches[0].clientX; tPY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchmove', function (e) {
  if (!tDrag) return;
  dragRotY += (e.touches[0].clientX - tPX) * .006;
  dragRotX += (e.touches[0].clientY - tPY) * .006;
  dragRotX = Math.max(-.9, Math.min(.9, dragRotX));
  tPX = e.touches[0].clientX; tPY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', function (e) {
  tDrag = false;
  if (navReady) {
    var t = e.changedTouches[0];
    var hit = JFCube.hitFront(rc, cubeP, camera, t.clientX, t.clientY, canvas);
    if (hit && hit.data) doNav(hit.data);
  }
}, { passive: true });

/* ── Mouse parallax — tiny, cheap, fades out as we lock in ── */
var mouseNX = 0, mouseNY = 0;
window.addEventListener('mousemove', function (e) {
  mouseNX = (e.clientX / innerWidth) * 2 - 1;
  mouseNY = (e.clientY / innerHeight) * 2 - 1;
});

/* ── Raycast click on the cube's front-face squares ── */
var rc = JFCube.makeRaycaster();
var hovered = null;
var navigating = false;

canvas.addEventListener('mousemove', function (e) {
  if (!navReady) { hovered = null; canvas.style.cursor = drag ? 'grabbing' : 'grab'; return; }
  var hit = JFCube.hitFront(rc, cubeP, camera, e.clientX, e.clientY, canvas);
  if (hit && hit.data && hit.data.url) { canvas.style.cursor = 'pointer'; hovered = hit; }
  else { canvas.style.cursor = 'grab'; hovered = null; }
});

canvas.addEventListener('click', function (e) {
  if (!navReady || navigating || drag) return;
  var hit = JFCube.hitFront(rc, cubeP, camera, e.clientX, e.clientY, canvas);
  if (hit && hit.data && hit.data.url) doNav(hit.data);
});

function doNav(data) {
  if (navigating) return;
  navigating = true;
  console.log('[JF Portal] Navigating to', data.url);
  JFCube.scatter(cubeP, data.url, data.label);
}

/* ═══════════════════════════════════════
   UI refs
═══════════════════════════════════════ */
var hlEl = document.getElementById('hl');
var siEl = document.getElementById('si');
var chEl = document.getElementById('ch');
var navReady = false;

/* ═══════════════════════════════════════
   RENDER LOOP — every value below is recomputed
   fresh each frame purely from (t, P, drag offsets).
   Nothing persists across frames except smoothing lerps,
   so it can never get "stuck" in a bad state.
═══════════════════════════════════════ */
var clock = new THREE.Clock();
var camZ = 12, camY = .4;
var rotXSmooth = 0, rotYSmooth = 0;

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  /* Camera — continuous zoom, fully reversible */
  var zoomT = smoothstep(0, .85, P);
  var targetCamZ = 12 - easeOutCubic(zoomT) * 9.4;   /* 12 → 2.6 */
  var targetCamY = .4 - zoomT * .4;
  camZ += (targetCamZ - camZ) * .07;
  camY += (targetCamY - camY) * .07;
  camera.position.set(0, camY, camZ);
  camera.lookAt(0, 0, 0);

  /* Entrance flourish — decays purely with elapsed time, never re-triggers */
  var entranceDecay = Math.exp(-t * 1.0);
  var entranceSpin = entranceDecay * 18;

  /* Auto-rotate (always running) */
  var autoY = t * .35;
  var autoX = .22 + Math.sin(t * .18) * .08;

  /* Fast extra spin keyed to scroll — monotonic in P, fully reversible */
  var spinBoost = easeOutCubic(smoothstep(.12, .50, P)) * Math.PI * 4;

  /* Lock-to-face-forward factor — grows with P, freezes rotation at high P */
  var lockT = smoothstep(.45, .80, P);

  var targetRotY = (autoY + spinBoost + entranceSpin + dragRotY) * (1 - lockT);
  var targetRotX = (autoX + entranceDecay * 6 + dragRotX) * (1 - lockT);

  /* Mouse parallax, fades out as we lock in */
  var parallax = (1 - lockT) * .12;
  targetRotY += mouseNX * parallax;
  targetRotX += -mouseNY * parallax * .6;

  rotYSmooth += (targetRotY - rotYSmooth) * .09;
  rotXSmooth += (targetRotX - rotXSmooth) * .09;
  cubeG.rotation.set(rotXSmooth, rotYSmooth, 0);

  /* Gentle float, fades out as we lock in */
  cubeG.position.y = Math.sin(t * .5) * .14 * (1 - lockT);

  /* Mini cube — always spins on its own, independent of parent lock */
  miniG.rotation.y = t * .8;
  miniG.rotation.x = .3 + Math.sin(t * .5) * .15;

  /* Hover glow on the 9 front tiles */
  navReady = P > .82 && !navigating;
  cubeP.forEach(function (p) {
    if (!p.isFront) return;
    var tgt = (navReady && p === hovered) ? 1.12 : 1.0;
    p.mesh.scale.x += (tgt - p.mesh.scale.x) * .18;
    p.mesh.scale.y += (tgt - p.mesh.scale.y) * .18;
    p.mesh.scale.z += (tgt - p.mesh.scale.z) * .18;
  });

  /* UI */
  hlEl.style.opacity = String(clamp01(1 - P * 7));
  siEl.style.opacity = String(clamp01(1 - P * 9));
  if (navReady) chEl.classList.add('show'); else chEl.classList.remove('show');

  /* Stars + light pulse */
  stars.rotation.y = t * .012;
  lights.rim.intensity = 7.5 + Math.sin(t * 1.2) * 1.4;
  lights.fill.intensity = 5.0 + Math.cos(t * .9) * 1.0;

  renderer.render(scene, camera);
}
animate();
console.log('[JF Portal] Render loop started.');

window.addEventListener('resize', function () {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

document.getElementById('jfLoader').classList.add('done');
console.log('[JF Portal] Ready.');

})();
} catch (fatal) {
  console.error('[JF Portal] FATAL:', fatal);
  document.querySelector('#jfLoader p').textContent = 'Something went wrong — please refresh';
  document.getElementById('jfLoader').classList.remove('done');
}
}
</script>
<script src="js/flowbot.js"></script>
</body>
</html>
