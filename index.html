<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Joel Flowstack — Interactive 3D Websites & AI Automations</title>
<link rel="stylesheet" href="css/global.css"/>
<style>
html, body { height: 100%; overflow: hidden; background: #000; }

/* The scrollable container — body stays fixed, this div scrolls */
#scroller {
  position: fixed; inset: 0;
  overflow-y: scroll;
  z-index: 0;
  /* Hide scrollbar visually but keep it functional */
  scrollbar-width: none;
}
#scroller::-webkit-scrollbar { display: none; }
#scroller-inner { height: 600vh; }

/* Fixed canvas behind everything */
#c {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  display: block; z-index: 1;
}

/* Headline — bottom left, fades as we zoom in */
#hl {
  position: fixed;
  left: clamp(1.5rem, 4vw, 4.5rem);
  bottom: clamp(2rem, 6vh, 4.5rem);
  z-index: 10; pointer-events: none;
  transition: opacity .35s ease, transform .35s ease;
}
#hl h1 {
  font-size: clamp(2rem, 5vw, 4.5rem);
  font-weight: 700; letter-spacing: -.035em; line-height: .95; color: #fff;
}
#hl h1 span {
  background: linear-gradient(130deg, #A78BFA, #06B6D4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#hl p {
  font-family: 'Space Mono', monospace; font-size: .62rem;
  letter-spacing: .18em; text-transform: uppercase;
  color: rgba(255,255,255,.28); margin-top: .65rem;
}

/* Scroll indicator */
#si {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%); z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  font-family: 'Space Mono', monospace; font-size: .58rem;
  letter-spacing: .18em; text-transform: uppercase;
  color: rgba(255,255,255,.28); pointer-events: none;
  opacity: 0; animation: sfade .8s 1.8s ease both;
  transition: opacity .4s;
}
#si .si-line {
  width: 1px; height: 30px;
  background: linear-gradient(to bottom, rgba(123,97,255,.7), transparent);
  animation: siline 1.6s 2s ease infinite;
}
@keyframes siline {
  0%   { transform: scaleY(0); transform-origin: top; }
  50%  { transform: scaleY(1); transform-origin: top; }
  51%  { transform: scaleY(1); transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}
@keyframes sfade { to { opacity: 1; } }

/* "Click a square" hint — appears when inner cube is shown */
#ch {
  position: fixed; top: 1.5rem; left: 50%;
  transform: translateX(-50%); z-index: 20;
  font-family: 'Space Mono', monospace; font-size: .62rem;
  letter-spacing: .18em; text-transform: uppercase;
  color: rgba(167,139,250,.9);
  background: rgba(6,6,18,.82); backdrop-filter: blur(14px);
  padding: .55rem 1.4rem; border-radius: 50px;
  border: 1px solid rgba(123,97,255,.38);
  display: none; align-items: center; gap: .55rem;
  pointer-events: none; white-space: nowrap;
  animation: chbob 1.8s ease-in-out infinite;
}
#ch.show { display: flex; }
@keyframes chbob {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-5px); }
}

/* Entering overlay */
#jf-entering {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(6,6,15,0); pointer-events: none;
  transition: background .4s ease;
}
#jf-entering.go { background: rgba(6,6,15,.96); }
#jf-entering-text {
  font-family: 'Space Mono', monospace; font-size: .85rem;
  letter-spacing: .25em; text-transform: uppercase;
  color: #A78BFA; opacity: 0; transition: opacity .3s .15s;
}
#jf-entering.go #jf-entering-text { opacity: 1; }

/* Loader */
#jf-loader {
  position: fixed; inset: 0; z-index: 900; background: #000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .5s;
}
#jf-loader.done { opacity: 0; pointer-events: none; }
.jf-ring {
  width: 34px; height: 34px;
  border: 2px solid rgba(123,97,255,.18); border-top-color: #7B61FF;
  border-radius: 50%; animation: jspin .7s linear infinite;
}
@keyframes jspin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="jf-loader"><div class="jf-ring"></div></div>

<!-- Scrollable height driver -->
<div id="scroller"><div id="scroller-inner"></div></div>

<!-- Three.js canvas -->
<canvas id="c"></canvas>

<!-- Headline -->
<div id="hl">
  <h1>Joel<br/><span>Flowstack</span></h1>
  <p>Scroll to enter</p>
</div>

<!-- Scroll indicator -->
<div id="si"><span>Scroll</span><div class="si-line"></div></div>

<!-- Click hint -->
<div id="ch">✦ <span>Click a square to enter</span> ✦</div>

<!-- Entering overlay -->
<div id="jf-entering"><span id="jf-entering-text">Entering...</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="js/cube.js"></script>
<script>
(function () {
'use strict';

/* ═══════════════════════════════════════
   RENDERER
═══════════════════════════════════════ */
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight, false);
renderer.setClearColor(0x000000, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(44, innerWidth / innerHeight, .1, 100);
camera.position.set(0, .5, 14);
camera.lookAt(0, 0, 0);

/* ── Lights ── */
var lights = JFCube.addLights(scene);

/* ── Stars ── */
var sN = 220, sP = new Float32Array(sN * 3);
for (var i = 0; i < sN * 3; i++) sP[i] = (Math.random() - .5) * 42;
var sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sP, 3));
var stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0x6644bb, size: .055, transparent: true, opacity: .35 }));
scene.add(stars);

/* ═══════════════════════════════════════
   OUTER CUBE — main big cube, no labels
   Smooth glossy black, all faces plain
═══════════════════════════════════════ */
var outer = JFCube.build(scene, []);
var outerGroup  = outer.group;

/* ═══════════════════════════════════════
   INNER NAV CUBE — sits on front face of outer cube
   8 page labels + center logo
   Face-locked always (rotation = 0)
═══════════════════════════════════════ */
var NAV = [
  { gx:-1, gy: 1, label:'Home',      url:'pages/home.html' },
  { gx: 0, gy: 1, label:'About',     url:'pages/about.html' },
  { gx: 1, gy: 1, label:'Services',  url:'pages/services.html' },
  { gx:-1, gy: 0, label:'Portfolio', url:'pages/portfolio.html' },
  /* center (0,0) → no entry → becomes JF logo via isLogo logic */
  { gx: 1, gy: 0, label:'Blog',      url:'pages/blog.html' },
  { gx:-1, gy:-1, label:'Contact',   url:'pages/contact.html' },
  { gx: 0, gy:-1, label:'YouTube',   url:'https://www.youtube.com/channel/UCyB6tXCbdBczkZwD__VCdTA' },
  { gx: 1, gy:-1, label:'TikTok',    url:'https://www.tiktok.com/@joelflowstack' },
];

var inner = JFCube.build(scene, NAV);
var innerGroup  = inner.group;
var innerPieces = inner.pieces;

/* Scale inner cube to fit nicely on the front face of outer cube */
innerGroup.scale.setScalar(0.30);
/* Keep it in world space — we manually position it each frame */
innerGroup.visible = false;

/* ═══════════════════════════════════════
   SCROLL STATE
   One fixed path: P = 0 → 1
═══════════════════════════════════════ */
var scroller = document.getElementById('scroller');
var P = 0; // 0 → 1

scroller.addEventListener('scroll', function () {
  var max = Math.max(scroller.scrollHeight - scroller.clientHeight, 1);
  P = Math.min(scroller.scrollTop / max, 1);
}, { passive: true });

/* ── Easing ── */
function eioQ(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }   // ease in-out quad
function eoQ(t)  { return t * (2 - t); }                        // ease out quad
function eoC(t)  { return 1 - Math.pow(1-t, 3); }              // ease out cubic

/* ═══════════════════════════════════════
   DRAG — only when P < 0.1
═══════════════════════════════════════ */
var rotX = .22, rotY = .5;
var tgtX = .22, tgtY = .5;
var drag = false, pMX = 0, pMY = 0, velX = 0, velY = 0;

canvas.addEventListener('mousedown', function (e) {
  if (P > .12) return;
  drag = true; velX = 0; velY = 0; pMX = e.clientX; pMY = e.clientY;
});
window.addEventListener('mousemove', function (e) {
  if (!drag) return;
  var dx = e.clientX - pMX, dy = e.clientY - pMY;
  velY = dx * .012; velX = dy * .012;
  tgtX += dy * .01; tgtY += dx * .01;
  tgtX = Math.max(-1.2, Math.min(1.2, tgtX));
  pMX = e.clientX; pMY = e.clientY;
});
window.addEventListener('mouseup', function () { drag = false; });

/* Touch drag */
var tDrag = false, tPX = 0, tPY = 0;
canvas.addEventListener('touchstart', function (e) {
  if (P > .12) return;
  tDrag = true; tPX = e.touches[0].clientX; tPY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchmove', function (e) {
  if (!tDrag) return;
  tgtY += (e.touches[0].clientX - tPX) * .01;
  tgtX += (e.touches[0].clientY - tPY) * .01;
  tgtX = Math.max(-1.2, Math.min(1.2, tgtX));
  tPX = e.touches[0].clientX; tPY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', function (e) {
  tDrag = false;
  /* Short tap → try click */
  if (navReady) {
    var t = e.changedTouches[0];
    var hit = JFCube.hitFront(rc, innerPieces, camera, t.clientX, t.clientY, canvas);
    if (hit && hit.data) doNav(hit.data);
  }
}, { passive: true });

/* ═══════════════════════════════════════
   RAYCAST — inner cube click
═══════════════════════════════════════ */
var rc = JFCube.makeRaycaster();
var hovered = null;
var navReady = false;
var navigating = false;

canvas.addEventListener('mousemove', function (e) {
  if (!navReady) return;
  var hit = JFCube.hitFront(rc, innerPieces, camera, e.clientX, e.clientY, canvas);
  if (hit && hit.data && hit.data.url) {
    canvas.style.cursor = 'pointer';
    hovered = hit;
  } else {
    canvas.style.cursor = 'default';
    hovered = null;
  }
});

canvas.addEventListener('click', function (e) {
  if (!navReady || navigating) return;
  var hit = JFCube.hitFront(rc, innerPieces, camera, e.clientX, e.clientY, canvas);
  if (hit && hit.data && hit.data.url) doNav(hit.data);
});

function doNav(data) {
  if (navigating) return;
  navigating = true;
  JFCube.scatter(innerPieces, data.url, data.label);
}

/* ═══════════════════════════════════════
   SCROLL BACK — same path, same position
═══════════════════════════════════════ */
/* Scroll position fully determines everything — no separate state needed.
   Scrolling back up just reverses P which reverses the animation. */

/* ═══════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════ */
var clock  = new THREE.Clock();
var camZ   = 14, camY = .5;
var innerOp = 0;

var hlEl = document.getElementById('hl');
var siEl = document.getElementById('si');
var chEl = document.getElementById('ch');

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  /* ── Camera zoom — single smooth path ──
     P 0.00–0.15 : idle at z=14
     P 0.15–0.70 : fast zoom in z=14→2.2
     P 0.70–1.00 : settled at z=2.2→2.0
  */
  var tCZ, tCY = .4;
  if (P < .15) {
    tCZ = 14; tCY = .5;
  } else if (P < .70) {
    var zp = eoC((P - .15) / .55);
    tCZ = 14 - zp * 11.8; tCY = .5 - zp * .5;
  } else {
    var zp2 = (P - .70) / .30;
    tCZ = 2.2 - zp2 * .2; tCY = 0;
  }
  camZ += (tCZ - camZ) * .065;
  camY += (tCY - camY) * .065;
  camera.position.z = camZ;
  camera.position.y = camY;
  camera.lookAt(0, 0, 0);

  /* ── Outer cube rotation — fixed path ──
     P 0.00–0.12 : gentle auto-spin, draggable
     P 0.12–0.50 : FAST dramatic spin (2 full Y rotations + X settles)
     P 0.50–0.70 : decelerate, align to face-forward
     P 0.70–1.00 : locked face-forward
  */
  if (P < .12) {
    /* Intro — auto spin + drag */
    if (!drag && !tDrag) {
      velX *= .93; velY *= .93;
      tgtX += velX; tgtY += velY + .0025;
      tgtX = Math.max(-1.2, Math.min(1.2, tgtX));
    }
    rotX += (tgtX - rotX) * .08;
    rotY += (tgtY - rotY) * .08;
    outerGroup.rotation.x = rotX;
    outerGroup.rotation.y = rotY;
    outerGroup.rotation.z = 0;

  } else if (P < .50) {
    /* Fast dramatic spin */
    var sp = eioQ((P - .12) / .38);
    /* 2 full Y rotations + start Y → 0 at end */
    outerGroup.rotation.y = rotY + sp * Math.PI * 4;
    outerGroup.rotation.x = rotX * (1 - sp);
    outerGroup.rotation.z = Math.sin(sp * Math.PI) * .15; /* slight Z wobble for drama */

  } else if (P < .70) {
    /* Decelerate — ease out to face-forward */
    var ap = eoC((P - .50) / .20);
    /* Current rotation after spin phase end */
    var spinEndY = rotY + Math.PI * 4;
    var snapY = Math.round(spinEndY / (Math.PI * 2)) * Math.PI * 2;
    outerGroup.rotation.y += (snapY - outerGroup.rotation.y) * ap * .12;
    outerGroup.rotation.x += (0 - outerGroup.rotation.x) * ap * .12;
    outerGroup.rotation.z += (0 - outerGroup.rotation.z) * ap * .12;

  } else {
    /* Locked face-forward */
    outerGroup.rotation.x += (0 - outerGroup.rotation.x) * .14;
    outerGroup.rotation.y += (0 - outerGroup.rotation.y) * .14;
    outerGroup.rotation.z += (0 - outerGroup.rotation.z) * .14;
  }

  /* ── Gentle float (only when not fully zoomed) ── */
  if (P < .65) {
    outerGroup.position.y = Math.sin(t * .45) * .14;
  } else {
    outerGroup.position.y += (0 - outerGroup.position.y) * .08;
  }

  /* ── Inner cube: always face-forward, floating on outer front face ──
     Position = outer cube's front face center in world space.
     The outer cube's local front face center is (0, 0, GAP*1.06 + SZ/2).
     We convert this to world space each frame.
  */
  var frontLocal = new THREE.Vector3(0, 0, JFCube.GAP * 1.08 + .46);
  var frontWorld = outerGroup.localToWorld(frontLocal.clone());
  innerGroup.position.copy(frontWorld);
  innerGroup.rotation.set(0, 0, 0); /* always face camera */

  /* ── Inner cube visibility — fades in at P > 0.72 ── */
  var targetOp = P > .72 ? 1 : 0;
  innerOp += (targetOp - innerOp) * .10;

  if (innerOp > .02) {
    innerGroup.visible = true;
    innerPieces.forEach(function (p) {
      if (Array.isArray(p.mesh.material)) {
        p.mesh.material.forEach(function (m) {
          if (m) { m.transparent = true; m.opacity = innerOp; }
        });
      }
    });
  } else {
    innerGroup.visible = false;
  }

  navReady = (P > .80 && !navigating);

  /* ── Hover glow ── */
  if (navReady) {
    innerPieces.forEach(function (p) {
      if (!p.isFront) return;
      var tgt = (p === hovered) ? 1.1 : 1.0;
      p.mesh.scale.x += (tgt - p.mesh.scale.x) * .18;
      p.mesh.scale.y += (tgt - p.mesh.scale.y) * .18;
      p.mesh.scale.z += (tgt - p.mesh.scale.z) * .18;
    });
  }

  /* ── UI state ── */
  hlEl.style.opacity = String(Math.max(0, 1 - P / .1));
  siEl.style.opacity = String(Math.max(0, 1 - P * 12));
  if (P > .80 && !navigating) chEl.classList.add('show');
  else chEl.classList.remove('show');

  /* ── Stars + lights ── */
  stars.rotation.y = t * .01;
  stars.material.opacity = Math.max(0, .35 - P * .45);
  lights.rim.intensity  = 4.5 + Math.sin(t * 1.2) * .8;
  lights.fill.intensity = 2.8 + Math.cos(t * .9) * .6;

  renderer.render(scene, camera);
}
animate();

/* ── Resize ── */
window.addEventListener('resize', function () {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

/* ── Hide loader ── */
document.getElementById('jf-loader').classList.add('done');

})();
</script>
</body>
</html>
