<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Joel Flowstack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/global.css" />
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<style>
  form { display: flex; flex-direction: column; gap: 18px; max-width: 480px; }
  form label { font-family: var(--font-mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--grey-dim); }
  form input, form textarea {
    background: var(--obsidian); border: 1px solid var(--line); color: var(--white);
    font-family: var(--font-body); font-size: .95rem; padding: 12px 14px; margin-top: 6px;
  }
  form input:focus, form textarea:focus { outline: none; border-color: var(--white); }
  form textarea { min-height: 120px; resize: vertical; }
</style>
</head>
<body>

<div id="site-nav"></div>

<header class="page-hero" style="min-height:42vh;">
  <canvas id="cube-canvas"></canvas>
  <div class="container hero-copy">
    <span class="eyebrow">Contact</span>
    <h1>Tell me what you're building.</h1>
  </div>
</header>

<section class="container">
  <div class="grid-2">
    <div data-reveal>
      <!--
        FORMSPREE SETUP: replace YOUR_FORM_ID below with your real
        Formspree form ID (create one free at formspree.io — takes
        about two minutes, no code). Until then this form won't
        actually deliver submissions anywhere.
      -->
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div>
          <label for="message">Project details</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button class="btn btn-solid" type="submit">Send message</button>
      </form>
    </div>
    <div data-reveal>
      <span class="eyebrow">Direct</span>
      <h3>Prefer email or chat?</h3>
      <p><a href="mailto:joelflowstack@gmail.com">joelflowstack@gmail.com</a></p>
      <p>Telegram: <a href="https://t.me/joelflowstack" target="_blank" rel="noopener">@joelflowstack</a></p>
      <p>Or ask the Flow bot in the corner — it's a live capability demo, not just decoration.</p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script type="module" src="../js/cube.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/flowbot.js"></script>
</body>
</html>
